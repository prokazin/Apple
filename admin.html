<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Админ-панель · Атмосфера</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ... все стили остаются без изменений ... */
        /* (вставьте стили из предыдущего admin.html) */
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">
            <span class="logo-icon"></span>
            <span class="logo-text">атмосфера · админ</span>
        </div>
    </div>

    <div class="container" style="max-width:800px;margin:0 auto;padding:0 20px;">
        <div class="admin-panel">
            <div id="loginForm" class="login-form active">
                <h2>🔐 Вход в админ-панель</h2>
                <input type="password" id="adminPassword" placeholder="Введите пароль" class="admin-input password-input">
                <button onclick="checkPassword()" class="admin-btn">Войти</button>
            </div>

            <div id="adminContent" class="admin-content">
                <h2>⚙️ Управление товарами</h2>
                <div class="admin-stats" id="stats">
                    <div><div class="number" id="totalCount">0</div><div class="label">Всего</div></div>
                    <div><div class="number" id="iPhoneCount">0</div><div class="label">iPhone</div></div>
                    <div><div class="number" id="MacCount">0</div><div class="label">Mac</div></div>
                    <div><div class="number" id="WatchCount">0</div><div class="label">Watch</div></div>
                </div>

                <div style="background:rgba(245,240,234,0.1);padding:16px;border-radius:6px;margin-bottom:16px;">
                    <h3 style="font-size:16px;font-weight:400;margin-bottom:10px;color:#1d1b1a;">📂 Управление категориями</h3>
                    <div class="categories-admin" id="categoriesAdminList"></div>
                    <div class="add-category-row">
                        <input type="text" id="newCategoryInput" placeholder="Название новой категории" class="admin-input">
                        <button onclick="addCategory()" class="admin-btn green small">➕ Добавить</button>
                    </div>
                </div>

                <div class="admin-search">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по названию..." class="admin-input" oninput="searchProducts()">
                </div>

                <div style="background:rgba(245,240,234,0.1);padding:16px;border-radius:6px;margin-bottom:16px;">
                    <h3 id="formTitle" style="font-size:16px;font-weight:400;margin-bottom:12px;color:#1d1b1a;">➕ Добавить товар</h3>
                    <input type="hidden" id="editId">
                    <div class="admin-row">
                        <input type="text" id="productName" placeholder="Название" class="admin-input">
                        <input type="number" id="productPrice" placeholder="Цена в рублях" class="admin-input">
                    </div>
                    <select id="productCategory" class="admin-input"></select>
                    
                    <div style="background:rgba(255,252,248,0.1);border-radius:6px;padding:14px;margin:6px 0 14px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                            <div style="font-size:12px;color:#7b5f47;text-transform:uppercase;letter-spacing:0.5px;">📋 Характеристики</div>
                            <button onclick="addSpecRow()" class="add-spec-btn">➕ Добавить</button>
                        </div>
                        <div class="specs-container" id="specsContainer"></div>
                    </div>
                    
                    <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                        <span class="icon">📸</span>
                        <div class="text">Нажмите или перетащите фото</div>
                        <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageUpload(event)">
                    </div>
                    <div class="image-preview-container" id="imagePreviewContainer"></div>
                    
                    <textarea id="productDesc" placeholder="Описание" rows="2" class="admin-input"></textarea>
                    
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="inStock" checked> В наличии</label>
                        <label><input type="checkbox" id="isHit"> Хит</label>
                        <label><input type="checkbox" id="isNew"> Новинка</label>
                        <label><input type="checkbox" id="isPremium"> Премиум</label>
                    </div>
                    
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <button onclick="addProduct()" id="submitBtn" class="admin-btn" style="flex:1;">➕ Добавить</button>
                        <button onclick="cancelEdit()" id="cancelBtn" class="admin-btn secondary" style="flex:1;display:none;">Отмена</button>
                    </div>
                </div>

                <div class="admin-toolbar">
                    <button onclick="sortProducts('name')" class="admin-btn secondary">По имени</button>
                    <button onclick="sortProducts('price')" class="admin-btn secondary">По цене</button>
                    <button onclick="sortProducts('category')" class="admin-btn secondary">По категории</button>
                    <button onclick="exportProducts()" class="admin-btn secondary">📤 Экспорт</button>
                    <button onclick="document.getElementById('importFile').click()" class="admin-btn secondary">📥 Импорт</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProducts(event)">
                    <button onclick="if(confirm('Удалить все товары?')){clearAllProducts();}" class="admin-btn danger">🗑️ Очистить всё</button>
                </div>

                <div class="admin-list" id="adminProductList"></div>
                <a href="index.html" class="back-link">← Вернуться в магазин</a>
            </div>
        </div>
    </div>

    <script>
        // ===== УНИКАЛЬНЫЕ КЛЮЧИ ДЛЯ APPLE МАГАЗИНА =====
        const STORAGE_KEY = 'apple_shop_products';
        const CATEGORY_KEY = 'apple_shop_categories';
        const ADMIN_PASSWORD = 'apple2026';

        let products = [];
        let categories = [];
        let searchQuery = '';
        let currentSort = '';
        let tempImages = [];

        function loadCategories() {
            const stored = localStorage.getItem(CATEGORY_KEY);
            if (stored) {
                try { categories = JSON.parse(stored); } catch (e) { categories = ['iPhone', 'Mac', 'Watch', 'Аксессуары']; }
            } else {
                categories = ['iPhone', 'Mac', 'Watch', 'Аксессуары'];
                localStorage.setItem(CATEGORY_KEY, JSON.stringify(categories));
            }
            renderCategoriesAdmin();
            renderCategorySelect();
            notifySite();
        }

        function renderCategoriesAdmin() {
            const container = document.getElementById('categoriesAdminList');
            if (!container) return;
            if (categories.length === 0) {
                container.innerHTML = '<span style="color:#7b5f47;font-size:14px;">Нет категорий</span>';
                return;
            }
            container.innerHTML = categories.map(cat => `
                <span class="category-tag">
                    ${cat.charAt(0).toUpperCase() + cat.slice(1)}
                    <button class="remove-cat" onclick="deleteCategory('${cat}')" title="Удалить категорию">✕</button>
                </span>
            `).join('');
        }

        function renderCategorySelect() {
            const select = document.getElementById('productCategory');
            if (!select) return;
            const currentValue = select.value || (categories.length > 0 ? categories[0] : '');
            select.innerHTML = categories.map(cat => `
                <option value="${cat}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</option>
            `).join('');
            if (categories.includes(currentValue)) select.value = currentValue;
            else if (categories.length > 0) select.value = categories[0];
        }

        function addCategory() {
            const input = document.getElementById('newCategoryInput');
            const name = input.value.trim().toLowerCase();
            if (!name) { showToast('❌ Введите название категории!'); return; }
            if (categories.includes(name)) { showToast('❌ Такая категория уже существует!'); return; }
            categories.push(name);
            localStorage.setItem(CATEGORY_KEY, JSON.stringify(categories));
            input.value = '';
            renderCategoriesAdmin();
            renderCategorySelect();
            notifySite();
            showToast('✅ Категория добавлена!');
        }

        function deleteCategory(cat) {
            const hasProducts = products.some(p => p.category === cat);
            if (hasProducts) { showToast('❌ Нельзя удалить категорию с товарами!'); return; }
            if (!confirm(`Удалить категорию "${cat}"?`)) return;
            categories = categories.filter(c => c !== cat);
            localStorage.setItem(CATEGORY_KEY, JSON.stringify(categories));
            renderCategoriesAdmin();
            renderCategorySelect();
            notifySite();
            showToast('🗑️ Категория удалена');
        }

        function notifySite() {
            localStorage.setItem(CATEGORY_KEY, JSON.stringify(categories));
            const event = new StorageEvent('storage', {
                key: CATEGORY_KEY,
                newValue: JSON.stringify(categories)
            });
            window.dispatchEvent(event);
        }

        function addSpecRow(key = '', value = '') {
            const container = document.getElementById('specsContainer');
            if (!container) return;
            const row = document.createElement('div');
            row.className = 'spec-row';
            row.innerHTML = `
                <input type="text" class="admin-input spec-key" placeholder="Название" value="${key}" style="margin:0;">
                <input type="text" class="admin-input spec-value" placeholder="Значение" value="${value}" style="margin:0;">
                <button class="remove-spec" onclick="removeSpecRow(this)">✕</button>
            `;
            container.appendChild(row);
        }

        function removeSpecRow(btn) {
            const row = btn.closest('.spec-row');
            if (row) {
                const container = document.getElementById('specsContainer');
                if (container.children.length <= 1) {
                    showToast('❌ Должна быть хотя бы одна характеристика');
                    return;
                }
                row.remove();
            }
        }

        function getSpecsFromRows() {
            const rows = document.querySelectorAll('.spec-row');
            const specs = {};
            for (const row of rows) {
                const keyInput = row.querySelector('.spec-key');
                const valueInput = row.querySelector('.spec-value');
                if (keyInput && valueInput) {
                    const key = keyInput.value.trim();
                    const value = valueInput.value.trim();
                    if (key && value) specs[key] = value;
                }
            }
            return specs;
        }

        function setSpecsToRows(specs) {
            const container = document.getElementById('specsContainer');
            container.innerHTML = '';
            const keys = Object.keys(specs);
            if (keys.length === 0) { addSpecRow('', ''); return; }
            for (const key of keys) addSpecRow(key, specs[key]);
        }

        function checkPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('adminContent').classList.add('active');
                loadAdminProducts();
                loadCategories();
            } else {
                showToast('❌ Неверный пароль!');
                document.getElementById('adminPassword').value = '';
            }
        }

        function loadAdminProducts() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { products = JSON.parse(stored); } catch (e) { products = []; }
            } else { products = []; }
            renderAdminList();
            updateStats();
        }

        function handleImageUpload(event) {
            const files = event.target.files;
            for (const file of files) {
                if (file.size > 5 * 1024 * 1024) {
                    showToast('❌ Файл слишком большой (макс. 5MB)');
                    continue;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempImages.push(e.target.result);
                    renderImagePreviews();
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }

        function renderImagePreviews() {
            const container = document.getElementById('imagePreviewContainer');
            if (!container) return;
            container.innerHTML = tempImages.map((img, index) => `
                <div class="image-preview">
                    <img src="${img}" alt="Фото">
                    <button class="remove-image" onclick="removeImage(${index})">✕</button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            tempImages.splice(index, 1);
            renderImagePreviews();
        }

        const uploadArea = document.getElementById('imageUploadArea');
        if (uploadArea) {
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                for (const file of files) {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            tempImages.push(ev.target.result);
                            renderImagePreviews();
                        };
                        reader.readAsDataURL(file);
                    }
                }
            });
        }

        function renderAdminList() {
            const list = document.getElementById('adminProductList');
            if (!list) return;
            let filtered = [...products];
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(p => 
                    (p.name && p.name.toLowerCase().includes(q)) || 
                    (p.desc && p.desc.toLowerCase().includes(q))
                );
            }
            if (currentSort === 'name') filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            else if (currentSort === 'price') filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
            else if (currentSort === 'category') filtered.sort((a, b) => (a.category || '').localeCompare(b.category || ''));
            
            if (filtered.length === 0) {
                list.innerHTML = '<p style="color:#7b5f47;text-align:center;padding:20px 0;font-weight:400;">Товаров не найдено</p>';
                return;
            }
            
            list.innerHTML = filtered.map(p => {
                const tags = p.tags || [];
                const tagsStr = tags.map(t => `<span style="background:rgba(245,240,234,0.3);padding:2px 8px;border-radius:4px;font-size:11px;color:#5a4a3a;">${t}</span>`).join(' ');
                const imagesCount = p.images ? p.images.length : 0;
                const specs = p.specs || {};
                const specKeys = Object.keys(specs);
                const specsDisplay = specKeys.length > 0 ? specKeys.map(k => `${k}: ${specs[k]}`).join(' · ') : '';
                
                return `
                <div class="admin-item">
                    <div class="admin-item-info">
                        <span style="font-weight:400;">${p.name || 'Без названия'}</span>
                        <span class="price">${(p.price || 0).toLocaleString('ru-RU')} ₽</span>
                        <span class="category-badge">${p.category || 'без категории'}</span>
                        <span style="color:${p.inStock !== false ? '#5a7a4a' : '#8a5a4a'};font-size:12px;">${p.inStock !== false ? '✓' : '✕'}</span>
                        <span style="font-size:11px;color:#7b5f47;">📸 ${imagesCount}</span>
                        ${specsDisplay ? `<span style="font-size:11px;color:#7b5f47;">${specsDisplay}</span>` : ''}
                        <span style="font-size:12px;color:#7b5f47;">${tagsStr}</span>
                    </div>
                    <div class="admin-item-actions">
                        <button class="edit-btn" onclick="editProduct(${p.id})">✎</button>
                        <button class="copy-btn" onclick="copyProduct(${p.id})">📋</button>
                        <button onclick="deleteProduct(${p.id})">✕</button>
                    </div>
                </div>
            `}).join('');
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = products.length;
            document.getElementById('iPhoneCount').textContent = products.filter(p => p.category === 'iPhone').length;
            document.getElementById('MacCount').textContent = products.filter(p => p.category === 'Mac').length;
            document.getElementById('WatchCount').textContent = products.filter(p => p.category === 'Watch').length;
        }

        function addProduct() {
            const editId = document.getElementById('editId').value;
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const category = document.getElementById('productCategory').value;
            const desc = document.getElementById('productDesc').value.trim();
            const inStock = document.getElementById('inStock').checked;
            const tags = [];
            if (document.getElementById('isHit').checked) tags.push('хит');
            if (document.getElementById('isNew').checked) tags.push('новинка');
            if (document.getElementById('isPremium').checked) tags.push('премиум');

            if (!name) { showToast('❌ Введите название товара!'); return; }
            if (!price || isNaN(price) || price <= 0) { showToast('❌ Введите корректную цену!'); return; }

            const specs = getSpecsFromRows();
            const images = tempImages.length > 0 ? tempImages : ['https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?w=800'];

            if (editId) {
                const index = products.findIndex(p => p.id === parseInt(editId));
                if (index !== -1) {
                    products[index] = { ...products[index], name, price, category, desc: desc || 'Без описания', inStock, tags, images, specs: Object.keys(specs).length > 0 ? specs : {} };
                    showToast('✅ Товар обновлён!');
                } else { showToast('❌ Товар не найден!'); return; }
                document.getElementById('editId').value = '';
                document.getElementById('formTitle').textContent = '➕ Добавить товар';
                document.getElementById('submitBtn').textContent = '➕ Добавить';
                document.getElementById('cancelBtn').style.display = 'none';
            } else {
                const newProduct = { id: Date.now(), name, price, category, desc: desc || 'Без описания', inStock, tags, images, specs: Object.keys(specs).length > 0 ? specs : {} };
                products.push(newProduct);
                showToast('✅ Товар добавлен!');
            }
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            renderAdminList();
            updateStats();
            clearForm();
        }

        function editProduct(id) {
            const p = products.find(item => item.id === id);
            if (!p) return;
            document.getElementById('editId').value = p.id;
            document.getElementById('productName').value = p.name || '';
            document.getElementById('productPrice').value = p.price || '';
            document.getElementById('productCategory').value = p.category || 'iPhone';
            document.getElementById('productDesc').value = p.desc || '';
            document.getElementById('inStock').checked = p.inStock !== false;
            document.getElementById('isHit').checked = (p.tags || []).includes('хит');
            document.getElementById('isNew').checked = (p.tags || []).includes('новинка');
            document.getElementById('isPremium').checked = (p.tags || []).includes('премиум');
            setSpecsToRows(p.specs || {});
            tempImages = p.images ? [...p.images] : [];
            renderImagePreviews();
            document.getElementById('formTitle').textContent = '✎ Редактировать товар';
            document.getElementById('submitBtn').textContent = '💾 Сохранить';
            document.getElementById('cancelBtn').style.display = 'block';
            document.getElementById('submitBtn').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function cancelEdit() {
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = '➕ Добавить товар';
            document.getElementById('submitBtn').textContent = '➕ Добавить';
            document.getElementById('cancelBtn').style.display = 'none';
            clearForm();
        }

        function copyProduct(id) {
            const p = products.find(item => item.id === id);
            if (!p) return;
            const copy = { ...p, id: Date.now(), name: p.name + ' (копия)', tags: [...(p.tags || [])], images: [...(p.images || [])], specs: p.specs ? { ...p.specs } : {} };
            products.push(copy);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            renderAdminList();
            updateStats();
            showToast('📋 Товар скопирован!');
        }

        function deleteProduct(id) {
            if (!confirm('Удалить товар?')) return;
            products = products.filter(p => p.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            renderAdminList();
            updateStats();
            showToast('🗑️ Товар удалён');
        }

        function clearAllProducts() {
            if (!confirm('Удалить все товары?')) return;
            products = [];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            renderAdminList();
            updateStats();
            showToast('🗑️ Все товары удалены');
        }

        function searchProducts() {
            searchQuery = document.getElementById('searchInput').value;
            renderAdminList();
        }

        function sortProducts(by) {
            currentSort = currentSort === by ? '' : by;
            renderAdminList();
        }

        function exportProducts() {
            const data = JSON.stringify(products, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `apple_store_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 Экспорт выполнен!');
        }

        function importProducts(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        products = imported;
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
                        renderAdminList();
                        updateStats();
                        showToast(`📥 Импортировано ${products.length} товаров!`);
                    } else { showToast('❌ Неверный формат файла'); }
                } catch (err) { showToast('❌ Ошибка чтения файла'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function clearForm() {
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productDesc').value = '';
            document.getElementById('inStock').checked = true;
            document.getElementById('isHit').checked = false;
            document.getElementById('isNew').checked = false;
            document.getElementById('isPremium').checked = false;
            const container = document.getElementById('specsContainer');
            container.innerHTML = '';
            addSpecRow('', '');
            tempImages = [];
            renderImagePreviews();
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        window.addEventListener('storage', (e) => {
            if (e.key === CATEGORY_KEY) {
                try { categories = JSON.parse(e.newValue); renderCategoriesAdmin(); renderCategorySelect(); } catch (e) {}
            }
            if (e.key === STORAGE_KEY) {
                try { products = JSON.parse(e.newValue); renderAdminList(); updateStats(); } catch (e) {}
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loginForm').classList.add('active');
            addSpecRow('', '');
        });
    </script>
</body>
</html>
