<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Store · Терра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ШАПКА -->
<header class="header">
    <div>
        <h1>🍎 <span>Терра</span> Apple</h1>
        <div class="subhead">Эстетика &amp; технология</div>
    </div>
    <div class="contact-icons">
        <button aria-label="Instagram" disabled>
            <svg viewBox="0 0 24 24"><path d="M12 2.2c3.2 0 3.6 0 4.9.1 1.2.1 2 .3 2.7.6.7.3 1.3.8 1.9 1.4s1.1 1.2 1.4 1.9c.3.7.5 1.5.6 2.7.1 1.3.1 1.7.1 4.9s0 3.6-.1 4.9c-.1 1.2-.3 2-.6 2.7-.3.7-.8 1.3-1.4 1.9s-1.2 1.1-1.9 1.4c-.7.3-1.5.5-2.7.6-1.3.1-1.7.1-4.9.1s-3.6 0-4.9-.1c-1.2-.1-2-.3-2.7-.6-.7-.3-1.3-.8-1.9-1.4s-1.1-1.2-1.4-1.9c-.3-.7-.5-1.5-.6-2.7-.1-1.3-.1-1.7-.1-4.9s0-3.6.1-4.9c.1-1.2.3-2 .6-2.7.3-.7.8-1.3 1.4-1.9s1.2-1.1 1.9-1.4c.7-.3 1.5-.5 2.7-.6 1.3-.1 1.7-.1 4.9-.1zm0-2.2C8.7 0 8.3 0 6.9.1 5.5.2 4.5.4 3.6.8c-.9.4-1.7 1-2.5 1.8S.4 4.3 0 5.1C-.4 6-.6 7-.7 8.4.1 9.8 0 10.2 0 12s0 2.2.1 3.6c.1 1.4.3 2.4.7 3.3.4.9 1 1.7 1.8 2.5s1.6 1.4 2.5 1.8c.9.4 1.9.6 3.3.7 1.4.1 1.8.1 3.6.1s2.2 0 3.6-.1c1.4-.1 2.4-.3 3.3-.7.9-.4 1.7-1 2.5-1.8s1.4-1.6 1.8-2.5c.4-.9.6-1.9.7-3.3.1-1.4.1-1.8.1-3.6s0-2.2-.1-3.6c-.1-1.4-.3-2.4-.7-3.3-.4-.9-1-1.7-1.8-2.5s-1.6-1.4-2.5-1.8C19.5.4 18.5.2 17.1.1 15.7 0 15.3 0 12 0z"/><circle cx="12" cy="12" r="4.5"/></svg>
        </button>
        <button aria-label="Telegram" disabled>
            <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.762 7.656l-1.826 8.607c-.146.658-.537.82-1.087.51l-3.01-2.224-1.45 1.396c-.16.16-.295.295-.605.295l.216-3.067 5.584-5.043c.243-.216-.053-.337-.377-.121l-6.897 4.343-2.972-.927c-.645-.201-.657-.645.135-.955l11.596-4.468c.537-.194 1.006.13.823.954z"/></svg>
        </button>
        <button aria-label="Phone" disabled>
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.574 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </button>
    </div>
</header>

<!-- КАТЕГОРИИ -->
<div class="category-tabs" id="categoryTabs"></div>

<!-- СЕТКА ТОВАРОВ -->
<div class="product-grid" id="productGrid"></div>

<!-- АДМИН-ПАНЕЛЬ -->
<div class="admin-panel" id="adminPanel">
    <h2>🔐 Админ-панель</h2>
    <div id="loginArea">
        <input type="password" id="adminPass" placeholder="Пароль (apple2026)">
        <button onclick="adminLogin()">Вход</button>
    </div>
    <div id="adminContent" class="hidden">
        <div class="stats" id="statsDisplay"></div>
        <div><input type="text" id="searchInput" placeholder="Поиск товаров..."></div>
        <div class="admin-row">
            <button onclick="sortProducts('name')">Сорт. имя</button>
            <button onclick="sortProducts('price')">Сорт. цена</button>
            <button onclick="sortProducts('category')">Сорт. кат.</button>
            <button onclick="exportJSON()">Экспорт JSON</button>
            <button onclick="document.getElementById('importFile').click()">Импорт JSON</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
            <button class="danger" onclick="clearAllProducts()">Очистить всё</button>
        </div>
        <hr>
        <h3>➕ Добавить товар</h3>
        <input type="text" id="prodName" placeholder="Название">
        <input type="number" id="prodPrice" placeholder="Цена (₽)">
        <select id="prodCategory"></select>
        <textarea id="prodDesc" placeholder="Описание"></textarea>
        <div><input type="text" id="prodTags" placeholder="Метки через запятую (Хит, Новинка, Премиум)"></div>
        <div><input type="text" id="prodStatus" placeholder="Статус: В наличии / Нет в наличии"></div>
        <div><input type="text" id="prodImages" placeholder="Ссылки на фото (через запятую)"></div>
        <div id="charContainer">
            <p>Характеристики:</p>
            <div id="charList"></div>
            <button onclick="addCharField()">+ Добавить характеристику</button>
        </div>
        <button onclick="addProduct()">Сохранить товар</button>
        <hr>
        <h3>📂 Управление категориями</h3>
        <div class="admin-row">
            <input type="text" id="newCategory" placeholder="Новая категория">
            <button onclick="addCategory()">Добавить</button>
        </div>
        <div id="categoryList"></div>
        <div style="margin-top:12px;"><em>Удалить категорию можно только если нет товаров.</em></div>
    </div>
</div>

<!-- МОДАЛКА -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div id="modalBody"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
