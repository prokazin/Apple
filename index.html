                <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.762 7.656l-1.826 8.607c-.146.658-.537.82-1.087.51l-3.01-2.224-1.45 1.396c-.16.16-.295.295-.605.295l.216-3.067 5.584-5.043c.243-.216-.053-.337-.377-.121l-6.897 4.343-2.972-.927c-.645-.201-.657-.645.135-.955l11.596-4.468c.537-.194 1.006.13.823.954z"/></svg>

            </a>
        </div>
    </div>

    <!-- Главный баннер -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge">коллекция 2026</div>
            <h2>Там, где<br>технология<br><span class="hero-accent">встречает эстетику</span></h2>
            <p class="hero-desc">Исследуйте нашу коллекцию устройств, созданных для вдохновения</p>
        </div>
    </section>

    <!-- Фильтр категорий (горизонтальный, стилизованный под чипсы) -->
    <div class="filter-section">
        <div class="filter-scroll" id="categoriesContainer">
            <!-- Категории будут загружены из localStorage -->
        </div>
    </div>

    <!-- Лента товаров (вертикальная) -->
    <section class="product-feed" id="productGrid">
        <!-- Товары загружаются динамически -->
    </section>

    <!-- Модальное окно -->
    <div class="product-modal" id="productModal">
        <div class="modal-overlay" onclick="closeProductModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeProductModal()">✕</button>
            <div class="modal-image-container">
                <img id="modalImage" src="" alt="" class="modal-image">
                <div class="modal-image-nav">
                    <button class="modal-nav-btn prev" onclick="changeImage(-1)">‹</button>
                    <span id="modalImageCounter" class="image-counter">1 / 1</span>
                    <button class="modal-nav-btn next" onclick="changeImage(1)">›</button>
                </div>
            </div>
            <div class="modal-info">
                <div class="modal-header">
                    <h2 id="modalName"></h2>
                    <span id="modalPrice" class="modal-price"></span>
                </div>
                <div class="modal-specs" id="modalSpecs"></div>
                <div class="modal-tags" id="modalTags"></div>
                <div class="modal-stock" id="modalStock"></div>
                <p id="modalDesc" class="modal-desc"></p>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <footer class="footer">
        <div class="footer-content">
            <span></span>
            <p>атмосфера · 2026</p>
            <span class="footer-dot">•</span>
            <span class="footer-meta">сделано с вниманием к деталям</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
